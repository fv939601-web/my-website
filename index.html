<!DOCTYPE html>
<html>
<head>
<title>Fayaz Khan Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  text-align:center;
  color:white;
  background:black;
  overflow-x:hidden;
  opacity:0;
}

/* VIDEO BG */
video {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* DARK OVERLAY */
.overlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* TITLE ANIMATION */
#title {
  animation: colorChange 3s infinite;
}

@keyframes colorChange {
  0% { color:white; }
  50% { color:orange; }
  100% { color:white; }
}

/* PROFILE */
.profile-img {
  width:150px;
  height:150px;
  border-radius:50%;
  border:4px solid white;
  margin-top:30px;
}

/* NAME GLOW */
#name {
  font-size:32px;
  text-shadow:0 0 10px white,0 0 20px orange,0 0 30px orange;
}

/* GLASS BUTTON */
button {
  padding:12px 25px;
  border:none;
  border-radius:25px;
  margin:10px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  background:rgba(255,255,255,0.2);
  color:white;
  backdrop-filter:blur(10px);
  transition:0.3s;
  box-shadow:0 0 10px white;
}

button:hover {
  background:orange;
  transform:scale(1.1);
  box-shadow:0 0 20px orange;
}

a { text-decoration:none; }

.section { padding:30px; }

/* WHATSAPP FLOAT */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:green;
  color:white;
  padding:15px;
  border-radius:50%;
  font-size:22px;
}
</style>
</head>

<body>

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop>
  <source src="https://www.w3schools.com/howto/rain.mp4">
</video>

<div class="overlay"></div>

<h2 id="title">🔥 Fayaz Khan Website</h2>

<img src="profile.jpg" class="profile-img">

<h1 id="name"></h1>
<p>🔥 Welcome to my official website</p>

<!-- BUTTONS -->
<a href="https://instagram.com/fayazkhan" target="_blank">
<button onclick="playClick()">Instagram 😍</button>
</a>

<a href="https://tiktok.com/@fayazkhan" target="_blank">
<button onclick="playClick()">TikTok 🎵</button>
</a>

<br>

<a href="https://wa.me/923410515357" target="_blank">
<button onclick="playClick()">WhatsApp 💬</button>
</a>

<br>

<button onclick="playMusic(); playClick()">Play Music 🎵</button>

<!-- ABOUT -->
<div class="section">
<h2>😎 About Me</h2>
<p>I am Fayaz Khan 👑</p>
<p>I love cricket 🏏 and social media 📱</p>
</div>

<!-- FLOAT -->
<a href="https://wa.me/923410515357" class="whatsapp">💬</a>

<!-- AUDIO -->
<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<audio id="clickSound">
<source src="https://www.soundjay.com/buttons/button-16.mp3">
</audio>

<script>
// FADE
window.onload = () => {
  document.body.style.transition = "1s";
  document.body.style.opacity = 1;
};

// TYPING
let text = "😎 Fayaz Khan";
let i = 0;

function typing() {
  if (i < text.length) {
    document.getElementById("name").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 100);
  }
}
typing();

// MUSIC
function playMusic() {
  document.getElementById("music").play();
}

// CLICK SOUND
function playClick() {
  document.getElementById("clickSound").play();
}
</script>

</body>
</html>
