<!DOCTYPE html>
<html>
<head>
<title>Fayaz Khan Pro System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  text-align:center;
  color:white;
  background: linear-gradient(270deg,#667eea,#764ba2,#ff6a00);
  background-size:600% 600%;
  animation:bg 10s infinite;
}

@keyframes bg {
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

#loginBox {
  margin-top:150px;
}

input {
  padding:10px;
  border:none;
  border-radius:10px;
  margin:5px;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

#mainSite {
  display:none;
}

.nav {
  background:rgba(0,0,0,0.4);
  padding:15px;
}

.logout {
  position:absolute;
  right:10px;
  top:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Login 🔐</h2>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="mainSite">

<div class="nav">
  Fayaz Khan Website 🔥
  <button class="logout" onclick="logout()">Logout</button>
</div>

<h1>Welcome Fayaz Khan 😎</h1>
<p>🔥 Real System Activated</p>

<a href="https://www.instagram.com/johnson.lee.3367" target="_blank">
<button>Instagram 😍</button>
</a>

<a href="https://www.tiktok.com/@real.cricket5091" target="_blank">
<button>TikTok 🎵</button>
</a>

<a href="https://wa.me/923410515357" target="_blank">
<button>WhatsApp 💬</button>
</a>

</div>

<script>

// check login saved
if(localStorage.getItem("login")=="yes"){
  showSite();
}

function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(u=="fayaz" && p=="1234"){
    localStorage.setItem("login","yes");
    showSite();
  } else {
    alert("Wrong login ❌");
  }
}

function showSite(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("mainSite").style.display="block";
}

function logout(){
  localStorage.removeItem("login");
  location.reload();
}

</script>

</body>
</html>
