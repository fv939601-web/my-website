<!DOCTYPE html>

<style>
body {
margin:0;
font-family:Arial;
color:white;
text-align:center;
background: linear-gradient(270deg, #ff6a00, #ee0979);
background-size:400% 400%;
animation:bg 10s ease infinite;
transition:0.5s;
}

.dark {
background:#111;
color:#fff;
}

@keyframes bg {
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

/* NAV */
.nav {
background:#00000070;
padding:15px;
position:sticky;
top:0;
}

.nav a {

margin:10px;

}

/* PROFILE */
.profile img {
width:140px;
border-radius:50%;
border:3px solid white;
margin-top:30px;
}

/* BUTTON */
button {
padding:10px 20px;
border:none;
border-radius:20px;
margin:10px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

button:hover {
transform:scale(1.1);
}

/* SECTION */
.section {
padding:40px;
}

/* WHATSAPP FLOAT */
.whatsapp {
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:20px;
text-decoration:none;
}
</style>

<script>
function toggleMode(){
document.body.classList.toggle("dark");
}
</script>

</head>
