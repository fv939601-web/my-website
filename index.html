<!DOCTYPE html>
<html>
<head>
<title>Fayaz Khan Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html { scroll-behavior: smooth; }

body {
margin: 0;
font-family: Arial;
color: white;
text-align: center;

background: linear-gradient(270deg, #667eea, #764ba2, #ff6a00);
background-size: 600% 600%;
animation: bg 10s ease infinite;
}

@keyframes bg {
0% {background-position: 0% 50%;}
50% {background-position: 100% 50%;}
100% {background-position: 0% 50%;}
}

.nav {
background: rgba(0,0,0,0.4);
padding: 15px;
position: fixed;
width: 100%;
top: 0;
}

.nav a {
color: white;
margin: 10px;
text-decoration: none;
font-weight: bold;
}

.nav a:hover { color: yellow; }

.box {
margin-top: 130px;
padding: 25px;
background: rgba(0,0,0,0.3);
border-radius: 20px;
width: 90%;
max-width: 400px;
margin-left: auto;
margin-right: auto;
}

img {
width: 140px;
border-radius: 50%;
border: 3px solid white;
}

h1 {
font-size: 38px;
text-shadow: 0 0 10px white, 0 0 20px #ff6a00;
}

p { font-size: 18px; }

button {
padding: 12px 25px;
border: none;
border-radius: 25px;
margin: 10px;
cursor: pointer;
font-size: 16px;
background: white;
color: #764ba2;
transition: 0.3s;
}

button:hover {
background: black;
color: white;
}

.section {
margin-top: 80px;
padding: 30px;
}

.footer {
margin-top: 50px;
padding: 20px;
background: rgba(0,0,0,0.4);
font-size: 14px;
}
</style>
</head>

<body>
