<!DOCTYPE html>
<html>
<head>
  <title>Fayaz Khan Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial;
      color: white;
      text-align: center;

      background: linear-gradient(270deg, #667eea, #764ba2, #ff6a00);
      background-size: 600% 600%;
      animation: bg 10s ease infinite;
    }

    @keyframes bg {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .nav {
      background: rgba(0,0,0,0.4);
      padding: 15px;
      position: fixed;
      width: 100%;
      top: 0;
    }

    .nav a {
      color: white;
      margin: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    .nav a:hover {
      color: yellow;
    }

    .box {
      margin-top: 130px;
      padding: 25px;
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    img {
      width: 140px;
      border-radius: 50%;
      border: 3px solid white;
    }

    h1 {
      font-size: 38px;
      text-shadow: 0 0 10px white, 0 0 20px #ff6a00;
    }

    p {
      font-size: 18px;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      margin: 10px;
      cursor: pointer;
      font-size: 16px;
      background: white;
      color: #764ba2;
    }

    button:hover {
      background: black;
      color: white;
    }

    .section {
      margin-top: 80px;
      padding: 30px;
    }

    .footer {
      margin-top: 50px;
      padding: 20px;
      background: rgba(0,0,0,0.4);
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="nav">
    <a href="#">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </div>

  <!-- HOME -->
  <div class="box">
    <img src="https://i.imgur.com/4M34hi2.png">

    <h1>🔥 Hello Fayaz Khan</h1>
    <p>My Ultra Pro Website is live 🚀</p>

    <button onclick="alert('Welcome Fayaz Khan 😎🔥')">Click Me</button>

    <br>

    <a href="https://instagram.com" target="_blank">
      <button>Instagram 😍</button>
    </a>

    <a href="https://tiktok.com" target="_blank">
      <button>TikTok 🎵</button>
    </a>
  </div>

  <!-- ABOUT -->
  <div class="section" id="about">
    <h1>About Me 👤</h1>
    <p>I’m Fayaz Khan — learning coding and building awesome websites 💻🔥</p>
  </div>

  <!-- CONTACT -->
  <div class="section" id="contact">
    <h1>Contact Me 📞</h1>
    <p>Chat with me on WhatsApp 👇</p>

    <!-- YOUR WHATSAPP NUMBER ADDED -->
    <a href="https://wa.me/923410515357" target="_blank">
      <button>WhatsApp 💬</button>
    </a>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    Made by Fayaz Khan 💻🔥
  </div>

</body>
</html>
