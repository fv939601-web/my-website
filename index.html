<!DOCTYPE html>
<html>
<head>
<title>Fayaz Khan Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  text-align:center;
  color:white;
  background: radial-gradient(circle, #000000, #0f0f0f, #000000);
  opacity:0;
}

/* TITLE ANIMATION */
#title {
  animation: colorChange 3s infinite;
}

@keyframes colorChange {
  0% { color:white; }
  50% { color:orange; }
  100% { color:white; }
}

/* PROFILE */
.profile-img {
  width:150px;
  height:150px;
  border-radius:50%;
  border:4px solid white;
  margin-top:30px;
}

/* NAME */
#name {
  font-size:32px;
  text-shadow: 0 0 10px white, 0 0 20px orange, 0 0 30px orange;
}

/* BUTTON */
button {
  padding:12px 25px;
  border:none;
  border-radius:25px;
  margin:10px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  background:white;
  color:black;
  transition:0.3s;
  box-shadow: 0 0 10px white;
}

button:hover {
  background:orange;
  color:white;
  transform:scale(1.1);
  box-shadow: 0 0 20px orange;
}

a { text-decoration:none; }

.section { padding:30px; }

/* WHATSAPP FLOAT */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:green;
  color:white;
  padding:15px;
  border-radius:50%;
  font-size:22px;
}

/* BACKGROUND */
canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
</style>
</head>

<body>

<h2 id="title">🔥 Fayaz Khan Website</h2>

<img src="profile.jpg" class="profile-img">

<h1 id="name"></h1>
<p>🔥 Welcome to my official website</p>

<!-- BUTTONS (UPDATED LINKS) -->
<a href="https://instagram.com/fayazkhan" target="_blank">
<button>Instagram 😍</button>
</a>

<a href="https://tiktok.com/@fayazkhan" target="_blank">
<button>TikTok 🎵</button>
</a>

<br>

<a href="https://wa.me/923410515357" target="_blank">
<button>WhatsApp 💬</button>
</a>

<br>

<button onclick="playMusic()">Play Music 🎵</button>

<!-- ABOUT -->
<div class="section">
<h2>😎 About Me</h2>
<p>I am Fayaz Khan 👑</p>
<p>I love cricket 🏏 and social media 📱</p>
</div>

<!-- FLOAT -->
<a href="https://wa.me/923410515357" class="whatsapp">💬</a>

<!-- AUDIO -->
<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<canvas id="bg"></canvas>

<script>
// FADE
window.onload = () => {
  document.body.style.transition = "1s";
  document.body.style.opacity = 1;
};

// TYPING
let text = "😎 Fayaz Khan";
let i = 0;

function typing() {
  if (i < text.length) {
    document.getElementById("name").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 100);
  }
}
typing();

// MUSIC
function playMusic() {
  document.getElementById("music").play();
}

// PARTICLES
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2
  });
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "white";

  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();

    p.y += 0.4;
    if(p.y > canvas.height) p.y = 0;
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
